language: cpp

os:
  - linux
  - osx

osx_image: xcode9

compiler:
  - gcc
  - clang

env:
  global:
    - COVERITY_SCAN_PROJECT_NAME="svens/turner"
    - COVERITY_SCAN_NOTIFICATION_EMAIL="sven+turner@alt.ee"
    - COVERITY_SCAN_BRANCH_PATTERN="next"
    - COVERITY_SCAN_BUILD_COMMAND_PREPEND="cov-configure --comptype gcc --compiler gcc-7 --template"
    - COVERITY_SCAN_BUILD_COMMAND="cmake --build ."
    - secure: ""
  matrix:
    - BUILD_TYPE=Debug
    - BUILD_TYPE=Release

matrix:
  include:
    - os: linux
      compiler: gcc
      env: BUILD_TYPE=Coverage
    - os: linux
      compiler: gcc
      env: BUILD_TYPE=Coverity

addons:
  apt:
    sources:
      - ubuntu-toolchain-r-test
      - llvm-toolchain-trusty-5.0
      - kalakris-cmake
    packages:
      - clang-5.0
      - cmake
      - g++-7

before_install: |
  if test "${BUILD_TYPE}" = "Coverity"; then
    if test "${TRAVIS_BRANCH}" != "${COVERITY_SCAN_BRANCH_PATTERN}"; then
      exit 0
    fi
    if test "${TRAVIS_PULL_REQUEST}" != "false"; then
      exit 0
    fi
  fi

install: |
  source scripts/travis_install.sh

script: |
  source scripts/travis_script.sh

after_success: |
  source scripts/travis_success.sh
