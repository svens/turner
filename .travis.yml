language: cpp

os:
  - linux
  - osx

osx_image: xcode9

compiler:
  - gcc
  - clang

env:
  - BUILD_TYPE=Debug
  - BUILD_TYPE=Release

addons:
  apt:
    sources:
      - ubuntu-toolchain-r-test
      - llvm-toolchain-trusty
      - kalakris-cmake
    packages:
      - clang-3.9
      - cmake
      - g++-6

install:
  source scripts/travis_install.sh

script:
  source scripts/travis_script.sh
