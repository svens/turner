language: cpp

os:
  - linux
  - osx

osx_image: xcode9

compiler:
  - gcc
  - clang

env:
  - BUILD_TYPE=Debug
  - BUILD_TYPE=Release

matrix:
  include:
    - os: linux
      compiler: gcc
      env: BUILD_TYPE=Coverage

addons:
  apt:
    sources:
      - ubuntu-toolchain-r-test
      - llvm-toolchain-trusty-5.0
      - kalakris-cmake
    packages:
      - clang-5.0
      - cmake
      - g++-7

install:
  source scripts/travis_install.sh

script:
  source scripts/travis_script.sh

after_success:
  source scripts/travis_success.sh
